<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5E3D26"/>
      <stop offset="1" stop-color="#3F2817"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD23B"/>
      <stop offset="1" stop-color="#F0B100"/>
    </linearGradient>
  </defs>

  <!-- 배경 squircle -->
  <rect x="0" y="0" width="512" height="512" rx="120" fill="url(#bg)"/>
  <!-- 배지 테두리 -->
  <rect x="34" y="34" width="444" height="444" rx="104" fill="none" stroke="#FFD23B" stroke-width="5" opacity="0.22"/>

  <!-- 문서(아카이브) 레이어 - 돋보기 뒤 -->
  <g opacity="0.95">
    <rect x="150" y="300" width="150" height="120" rx="16" fill="#E9D7B6" transform="rotate(-9 225 360)"/>
    <rect x="176" y="300" width="150" height="120" rx="16" fill="#FBE7B0" transform="rotate(6 251 360)"/>
  </g>

  <!-- 돋보기 -->
  <g>
    <circle cx="232" cy="226" r="92" fill="#3F2817"/>
    <circle cx="232" cy="226" r="92" fill="none" stroke="url(#gold)" stroke-width="22"/>
    <circle cx="232" cy="226" r="70" fill="#FBE7B0"/>
    <!-- 렌즈 안: 보고서 텍스트 라인 -->
    <g stroke="#5E3D26" stroke-width="9" stroke-linecap="round">
      <line x1="196" y1="206" x2="276" y2="206"/>
      <line x1="196" y1="230" x2="268" y2="230"/>
      <line x1="196" y1="254" x2="252" y2="254"/>
    </g>
    <!-- 손잡이 -->
    <line x1="300" y1="294" x2="372" y2="366" stroke="url(#gold)" stroke-width="32" stroke-linecap="round"/>
  </g>

  <!-- 완료 체크 (Complete) -->
  <g transform="translate(360 150)">
    <circle cx="0" cy="0" r="34" fill="url(#gold)"/>
    <path d="M-15 0 L-4 12 L17 -13" fill="none" stroke="#3F2817" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
